<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Loom — AIの記憶を編むチャット</title>
  <style>
    :root {
      --bg: #0b1020; --bg2: #121933; --panel: rgba(255,255,255,0.08);
      --text: #eef2ff; --muted: #b6bfdc; --accent: #7c3aed; --danger: #ef4444;
      --line: rgba(255,255,255,0.12); --radius-xl: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: linear-gradient(180deg, #0a0f1f 0%, #0d1327 100%);
      color: var(--text); font-family: sans-serif; height: 100vh; overflow: hidden;
    }
    .app { height: 100vh; display: grid; grid-template-rows: auto 1fr auto; gap: 14px; padding: 16px; }
    .glass { background: var(--panel); border: 1px solid var(--line); backdrop-filter: blur(18px); border-radius: var(--radius-xl); }
    .header { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
    .main { display: grid; grid-template-columns: 1.6fr 0.9fr; gap: 14px; min-height: 0; }
    .panel { display: flex; flex-direction: column; overflow: hidden; }
    .chat-scroll { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
    .msg-row { display: flex; gap: 12px; animation: rise 0.2s ease; }
    .msg-row.user { justify-content: flex-end; }
    .bubble { padding: 12px 16px; border-radius: 18px; max-width: 85%; white-space: pre-wrap; line-height: 1.6; }
    .user .bubble { background: var(--accent); border-bottom-right-radius: 4px; }
    .model .bubble { background: rgba(255,255,255,0.1); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
    /* エラー用のスタイル */
    .error-bubble { border: 1px solid var(--danger) !important; background: rgba(239, 68, 68, 0.15) !important; color: #ffbaba; }
    .composer { padding: 14px; display: grid; grid-template-columns: 1fr auto; gap: 12px; }
    .textarea { background: rgba(0,0,0,0.3); border: 1px solid var(--line); color: #fff; padding: 12px; border-radius: 14px; resize: none; outline: none; }
    .send-btn { background: var(--accent); color: white; border: none; border-radius: 14px; padding: 0 24px; cursor: pointer; font-weight: bold; }
    .memory-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; border-left: 3px solid var(--accent); }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="app">
    <header class="header glass">
      <div style="display:flex; align-items:center; gap:10px;"><strong>🧠 Memory Loom</strong> <small style="color:var(--muted)">v2.5 Lite</small></div>
      <div>
        <button onclick="openKey()" style="background:none; border:1px solid var(--line); color:#fff; padding:5px 10px; border-radius:6px; cursor:pointer;">🔐 API Key</button>
        <button onclick="clearChat()" style="background:none; border:1px solid var(--danger); color:var(--danger); padding:5px 10px; border-radius:6px; cursor:pointer; margin-left:5px;">🧹 Clear</button>
      </div>
    </header>

    <main class="main">
      <section class="panel glass"><div class="chat-scroll" id="chat-box"></div></section>
      <aside class="panel glass" style="padding:16px;"><h3>Memory</h3><div id="mem-box"></div></aside>
    </main>

    <footer class="composer glass">
      <textarea id="input" class="textarea" placeholder="メッセージを入力..."></textarea>
      <button id="send" class="send-btn">Send</button>
    </footer>
  </div>

  <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); place-items:center; z-index:100;">
    <div class="glass" style="padding:24px; width:320px; text-align:center;">
      <h3>API Key</h3>
      <input type="password" id="key-in" style="width:100%; padding:10px; margin:15px 0; border-radius:8px; border:none; background:#000; color:#fff;">
      <button onclick="saveKey()" style="width:100%; padding:10px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer;">Save</button>
    </div>
  </div>

  <script>
    const state = {
      model: "gemini-2.5-flash-lite", // 2026年最新の軽量モデル
      apiKey: localStorage.getItem("key") || "",
      history: JSON.parse(localStorage.getItem("hist") || "[]"),
      mems: JSON.parse(localStorage.getItem("mems") || "[]"),
      loading: false
    };

    function saveKey() { state.apiKey = document.getElementById("key-in").value; localStorage.setItem("key", state.apiKey); document.getElementById("modal").style.display = "none"; }
    function openKey() { document.getElementById("key-in").value = state.apiKey; document.getElementById("modal").style.display = "grid"; }
    function clearChat() { if(!confirm("消去しますか？")) return; state.history = []; state.mems = []; localStorage.clear(); render(); }

    async function call(contents) {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${state.model}:generateContent?key=${state.apiKey}`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents })
      });
      if (!res.ok) {
        let msg = "";
        try { const j = await res.json(); msg = j.error.message; } catch { msg = await res.text(); }
        throw new Error(`[HTTP ${res.status}] ${msg}`);
      }
      const data = await res.json();
      return data.candidates[0].content.parts[0].text;
    }

    async function send() {
      const txt = document.getElementById("input").value.trim();
      if (!txt || state.loading || !state.apiKey) return;

      state.history.push({ role: "user", text: txt });
      // 簡易的なメモリ保存
      if (txt.match(/好き|嫌い|予算|目標/)) state.mems.unshift(txt.slice(0, 40) + "...");

      document.getElementById("input").value = "";
      state.loading = true;
      render();

      try {
        const payload = state.history.filter(h => !h.error).map(h => ({ role: h.role, parts: [{ text: h.text }] }));
        const ans = await call(payload);
        state.history.push({ role: "model", text: ans });
      } catch (e) {
        // ★ ここでチャット吹き出しとしてエラーを表示
        let errDesc = "通信エラー";
        if (e.message.includes("429")) errDesc = "【無料枠の制限】リクエスト回数が多すぎます。1分ほど待ってから再試行してください。";
        else if (e.message.includes("400")) errDesc = "【設定エラー】APIキーが無効、またはモデル名が正しくありません。";
        else if (e.message.includes("403")) errDesc = "【権限エラー】APIキーの制限設定（IP制限など）を確認してください。";

        state.history.push({ 
          role: "model", 
          text: `⚠️ エラーが発生しました\n------------------\n${errDesc}\n\n(詳細: ${e.message})`, 
          error: true 
        });
      } finally {
        state.loading = false;
        localStorage.setItem("hist", JSON.stringify(state.history));
        localStorage.setItem("mems", JSON.stringify(state.mems));
        render();
      }
    }

    function render() {
      const box = document.getElementById("chat-box");
      box.innerHTML = state.history.map(h => `
        <div class="msg-row ${h.role}">
          <div class="bubble ${h.error ? 'error-bubble' : ''}">${h.text}</div>
        </div>
      `).join("");
      document.getElementById("mem-box").innerHTML = state.mems.map(m => `<div class="memory-card">${m}</div>`).join("");
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById("send").onclick = send;
    document.getElementById("input").onkeydown = (e) => { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };
    render();
    if(!state.apiKey) setTimeout(openKey, 500);
  </script>
</body>
</html>
